<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Hacker — MathBlast</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/edu-games.css" />
  <style>
    .clock-container { position: relative; width: 200px; height: 200px; border: 8px solid var(--purple); border-radius: 50%; margin: 0 auto 2rem; background: rgba(0,0,0,0.5); box-shadow: 0 0 20px var(--purple); }
    .clock-center { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 10;}
    .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; background: #fff; border-radius: 5px; transition: transform 0.5s cubic-bezier(.4,2.08,.55,.44); }
    .hour-hand { width: 6px; height: 50px; margin-left: -3px; background: var(--pink); z-index: 5;}
    .min-hand { width: 4px; height: 80px; margin-left: -2px; background: var(--cyan); z-index: 4;}
    
    .time-question { font-family: var(--font-game); font-size: 1.5rem; text-align: center; color: #fff; margin-bottom: 2rem; }
    .time-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 400px; margin: 0 auto; }
    .time-btn { font-family: var(--font-game); font-size: 1.5rem; padding: 1rem; background: rgba(255,255,255,0.05); border: 2px solid var(--border); color: #fff; cursor: pointer; transition: 0.3s; border-radius: var(--radius-sm); }
    .time-btn:hover { background: rgba(0,212,255,0.2); border-color: var(--cyan); }
    .time-btn.correct { background: var(--green); color: #000; border-color: var(--green); }
    .time-btn.wrong { background: var(--pink); color: #000; border-color: var(--pink); }
  </style>
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo"><div class="logo-icon">⚡</div>Math<span class="logo-blast">Blast</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="games.html">← Back to Arcade</a></li>
    </ul>
  </nav>

  <div class="edu-page">
    
    <div class="edu-hud hidden" id="gameHud">
      <div class="edu-hud-item">
        <span class="edu-hud-label">Systems Hacked</span>
        <span class="edu-hud-val cyan" id="hudScore">0</span>
      </div>
      <div class="edu-hud-item text-right">
        <span class="edu-hud-label">Security</span>
        <span class="edu-hud-val" id="hudRep">⭐⭐⭐</span>
      </div>
    </div>

    <div class="edu-container hidden" id="gameContainer">
      <div class="clock-container">
        <div class="clock-center"></div>
        <div class="hand hour-hand" id="hHand"></div>
        <div class="hand min-hand" id="mHand"></div>
      </div>
      
      <div class="time-question" id="questionText">What time is shown on the clock?</div>
      
      <div class="time-options" id="optionsContainer"></div>
    </div>

    <div class="edu-overlay" id="startScreen">
      <div class="eo-icon">⏱️</div>
      <h1 class="eo-title">Time Hacker</h1>
      <p class="eo-desc">Read the analog clocks and calculate time durations to bypass the security systems.</p>
      
      <div style="margin-bottom: 2rem;">
        <label style="color:var(--text-muted); font-family:var(--font-game); font-size: 0.9rem; letter-spacing: 2px;">SELECT DIFFICULTY</label>
        <div style="display:flex; gap:1rem; justify-content:center; margin-top:0.8rem;">
          <button class="btn btn-secondary diff-btn" onclick="setDiff('easy', this)">Easy (Read Clock)</button>
          <button class="btn btn-primary diff-btn" onclick="setDiff('medium', this)">Medium (+30m)</button>
          <button class="btn btn-secondary diff-btn" onclick="setDiff('hard', this)">Hard (Odd Times)</button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg" onclick="startGame()">Initiate Hack</button>
    </div>

    <div class="edu-overlay hidden" id="resultScreen">
      <div class="eo-icon">🚨</div>
      <h1 class="eo-title">Lockdown!</h1>
      <div class="rs-stats">
        <div class="rs-stat-box">
          <div class="edu-hud-val cyan" id="rsScore">0</div>
          <div class="edu-hud-label">Systems Hacked</div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="startGame()">Try Again</button>
      <a href="games.html" class="btn btn-secondary mt-2">Exit</a>
    </div>

  </div>

  <script src="js/aws-config.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/main.js"></script>
  <script src="js/time.js"></script>
</body>
</html>
